<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OroLabs Protolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-color: #121212;
      --cell-bg: #1e1e1e;
      --border-color: #333;
      --text-main: #e8eaed;
      --text-muted: #9aa0a6;
      --accent: #8ab4f8;
      --btn-hover: #303134;
      --run-bg: #1a73e8;
      --run-hover: #1557b0;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
    }

    .topbar {
      background: var(--cell-bg);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }

    .actions button {
      margin-left: 8px;
      background: transparent;
      border: 1px solid var(--border-color);
      padding: 6px 16px;
      color: var(--text-main);
      border-radius: 4px;
      cursor: pointer;
    }

    .actions button.primary {
      background: var(--run-bg);
      border-color: var(--run-bg);
    }

    .notebook {
      padding: 40px 20px;
      max-width: 960px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cell {
      display: flex;
      background: var(--cell-bg);
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .cell-gutter {
      width: 60px;
      padding: 12px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .run-indicator {
      font-family: monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .run-btn {
      background: var(--btn-hover);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      color: var(--text-main);
      cursor: pointer;
    }

    .cell-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    textarea {
      width: 100%;
      background: transparent;
      color: var(--text-main);
      border: none;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      outline: none;
      min-height: 40px;
    }

    .output {
      background: #000;
      padding: 12px;
      border-radius: 4px;
      margin-top: 12px;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      display: none;
      border-left: 3px solid var(--accent);
    }

    .output.visible {
      display: block;
    }

    .output.error {
      border-left-color: #ff5252;
      color: #ff8a80;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">OroLabs Protolab</div>
  <div class="actions">
    <button onclick="addCell()">+ Code Cell</button>
    <button class="primary" onclick="runAllCells()">Run All</button>
  </div>
</div>

<div class="notebook" id="notebook"></div>

<script>
const API_URL = "https://protolab.research.orolabs.com/run";
const API_KEY = "dev-secret"; // replace or proxy in production

let executionCounter = 1;

function createCell() {
  const cell = document.createElement("div");
  cell.className = "cell";

  cell.innerHTML = `
    <div class="cell-gutter">
      <div class="run-indicator">[ ]</div>
      <button class="run-btn">▶</button>
    </div>
    <div class="cell-content">
      <textarea placeholder="Use !status, !train, or !predict"></textarea>
      <div class="output"></div>
    </div>
  `;

  const textarea = cell.querySelector("textarea");
  const runBtn = cell.querySelector(".run-btn");

  textarea.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";
  });

  textarea.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && e.shiftKey) {
      e.preventDefault();
      runCell(cell);
    }
  });

  runBtn.onclick = () => runCell(cell);

  return cell;
}

function addCell() {
  const notebook = document.getElementById("notebook");
  const cell = createCell();
  notebook.appendChild(cell);
  cell.querySelector("textarea").focus();
}

function parseCommand(code) {
  if (!code.startsWith("!")) {
    return null;
  }
  return code.substring(1).trim().toLowerCase();
}

async function runCell(cell) {
  const code = cell.querySelector("textarea").value.trim();
  const output = cell.querySelector(".output");
  const indicator = cell.querySelector(".run-indicator");

  if (!code) return;

  const action = parseCommand(code);

  if (!action) {
    output.classList.add("visible", "error");
    output.textContent = "Only OroLabs commands allowed. Example: !train";
    return;
  }

  indicator.textContent = "[*]";
  output.classList.remove("error");
  output.classList.add("visible");
  output.textContent = "Running " + action + "...";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": API_KEY
      },
      body: JSON.stringify({ action })
    });

    const data = await res.json();

    if (!res.ok) {
      output.classList.add("error");
    }

    output.textContent = JSON.stringify(data, null, 2);

  } catch (err) {
    output.classList.add("error");
    output.textContent = "Network error: " + err.message;
  }

  indicator.textContent = "[" + executionCounter++ + "]";
}

async function runAllCells() {
  const cells = document.querySelectorAll(".cell");
  for (const cell of cells) {
    await runCell(cell);
  }
}

document.addEventListener("DOMContentLoaded", () => addCell());
</script>

</body>
</html>
