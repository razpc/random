<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OroLabs Protolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg-color: #121212;
      --sidebar-bg: #181818;
      --cell-bg: #1e1e1e;
      --toolbar-bg: #212121;
      --border-color: #3c4043;
      --text-main: #e8eaed;
      --text-muted: #9aa0a6;
      --accent: #8ab4f8;
      --run-bg: #238636;
      --error-red: #ff7b72;
    }

    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      display: flex; height: 100vh; overflow: hidden;
    }

    .sidebar {
      width: 60px; background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 20px;
    }

    .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }

    .topbar {
      background: var(--toolbar-bg); padding: 8px 20px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border-color); height: 48px;
    }

    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--accent); }

    .btn {
      background: transparent; border: 1px solid var(--border-color);
      color: var(--text-main); padding: 5px 12px; border-radius: 4px;
      cursor: pointer; font-size: 13px; margin-left: 5px;
    }

    .btn-primary { background: var(--run-bg); border: none; font-weight: bold; }

    .notebook { padding: 20px 10%; flex: 1; }

    .cell {
      margin-bottom: 20px; background: var(--cell-bg);
      border-radius: 8px; border: 1px solid transparent;
      position: relative;
    }

    .cell:hover { border-color: var(--border-color); }

    .cell-header { display: flex; }

    .cell-gutter {
      width: 50px; display: flex; flex-direction: column; align-items: center; padding-top: 15px;
    }

    .run-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border-color);
      background: #303134; color: white; cursor: pointer; transition: 0.2s;
    }

    .run-btn:hover { background: var(--run-bg); }

    .editor-container { flex: 1; position: relative; padding: 10px 10px 10px 0; }

    .editor-container textarea, .editor-container pre {
      margin: 0; padding: 10px; font-family: 'Consolas', monospace;
      font-size: 14px; line-height: 1.5; width: 100%; box-sizing: border-box;
      min-height: 50px; tab-size: 4;
    }

    .editor-container textarea {
      background: transparent; color: transparent; caret-color: white;
      border: none; resize: none; outline: none; position: relative; z-index: 2;
    }

    .editor-container pre {
      position: absolute; top: 10px; left: 0; z-index: 1;
      pointer-events: none; background: transparent !important;
    }

    .output-area {
      background: #0d1117; border-top: 1px solid var(--border-color);
      padding: 10px 10px 10px 50px; font-family: monospace; font-size: 13px;
      white-space: pre-wrap; display: none;
    }

    .output-area.visible { display: block; }
    .output-area.error { color: var(--error-red); }

    .status-bar {
      height: 25px; background: #202124; border-top: 1px solid var(--border-color);
      font-size: 11px; display: flex; align-items: center; padding: 0 20px; gap: 20px;
    }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .online { background: #34a853; }
    .offline { background: #ea4335; }
  </style>
</head>
<body>

<div class="sidebar">
  <span>📁</span><span>⚙️</span>
</div>

<div class="main-wrapper">
  <div class="topbar">
    <div class="brand">OroLabs Protolab</div>
    <div class="toolbar-actions">
      <button class="btn" onclick="addCodeCell()">+ Code</button>
      <button class="btn btn-primary" onclick="runAllCells()">Run All</button>
    </div>
  </div>

  <div class="notebook" id="notebook"></div>

  <div class="status-bar">
    <span id="connection-status"><span class="status-dot offline"></span> Checking backend...</span>
    <span>OroLabs</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

<script>
// FIXED: Using 127.0.0.1 instead of localhost for better browser compatibility
const API_URL = "http://0.0.0.:8000/run";
const HEALTH_URL = "http://0.0.0.0:8000/health";
const API_KEY = "dev-secret";

async function checkHealth() {
    const statusEl = document.getElementById('connection-status');
    try {
        const res = await fetch(HEALTH_URL);
        if (res.ok) statusEl.innerHTML = '<span class="status-dot online"></span> Connected to Backend';
    } catch (e) {
        statusEl.innerHTML = '<span class="status-dot offline"></span> Backend Offline';
    }
}

function addCodeCell(code = "print('Hello Protolab')") {
    const notebook = document.getElementById('notebook');
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `
        <div class="cell-header">
            <div class="cell-gutter">
                <button class="run-btn" onclick="runSingleCell(this.closest('.cell'))">▶</button>
                <div style="font-size:10px; color:#999; margin-top:5px">[ ]</div>
            </div>
            <div class="editor-container">
                <textarea spellcheck="false" oninput="updateEditor(this)">${code}</textarea>
                <pre aria-hidden="true"><code class="language-python">${code}</code></pre>
            </div>
        </div>
        <div class="output-area"></div>
    `;
    notebook.appendChild(cell);
    updateEditor(cell.querySelector('textarea'));
}

function updateEditor(el) {
    const code = el.value;
    const pre = el.nextElementSibling;
    const codeEl = pre.querySelector('code');
    codeEl.textContent = code + (code.endsWith('\n') ? ' ' : '');
    Prism.highlightElement(codeEl);
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
    pre.style.height = el.scrollHeight + 'px';
}

async function runSingleCell(cell) {
    const code = cell.querySelector('textarea').value;
    const output = cell.querySelector('.output-area');
    output.className = 'output-area visible';
    output.textContent = 'Running...';

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "x-api-key": API_KEY 
            },
            body: JSON.stringify({ code: code })
        });

        const data = await res.json();
        if (data.stderr) {
            output.classList.add('error');
            output.textContent = data.stderr;
        } else {
            output.classList.remove('error');
            output.textContent = data.stdout || '(No output)';
        }
    } catch (err) {
        output.classList.add('error');
        output.textContent = "FAILED TO FETCH: Is the Python script running on 0.0.0.0:8000?";
    }
}

async function runAllCells() {
    for (const cell of document.querySelectorAll('.cell')) await runSingleCell(cell);
}

document.addEventListener('DOMContentLoaded', () => {
    checkHealth();
    addCodeCell();
});
</script>
</body>
</html>
