<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OroLabs Protolab</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
}

header {
    background: #111826;
    padding: 12px 20px;
    font-size: 18px;
    font-weight: bold;
}

#container {
    padding: 20px;
}

textarea {
    width: 100%;
    height: 200px;
    background: #0d1117;
    color: #e6edf3;
    border: 1px solid #30363d;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 10px 16px;
    background: #238636;
    color: white;
    border: none;
    cursor: pointer;
}

pre {
    background: #010409;
    padding: 15px;
    margin-top: 20px;
    border: 1px solid #30363d;
    overflow: auto;
}
</style>
</head>

<body>

<header>OroLabs Protolab</header>

<div id="container">
    <textarea id="code">print("Hello from Protolab")</textarea>
    <br>
    <button onclick="runCode()">Run</button>

    <pre id="output">Output will appear here...</pre>
</div>

<script>
async function runCode() {
    const code = document.getElementById("code").value;
    const output = document.getElementById("output");

    output.textContent = "Running...";

    try {
        const response = await fetch("http://localhost:8000/run", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ code: code })
        });

        const data = await response.json();
        output.textContent = data.output || JSON.stringify(data, null, 2);

    } catch (err) {
        output.textContent = "FETCH FAILED\n\n" + err;
    }
}
</script>

</body>
</html>
